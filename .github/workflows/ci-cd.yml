name: CI Pipeline (Build & Test)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code from GitHub
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up Java (Maven needs this)
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: maven

      # 3. Build project
      - name: Build project
        run: mvn clean package -DskipTests

      # 4. Run tests
      - name: Run tests
        run: mvn test