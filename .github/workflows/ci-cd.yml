name: CI Pipeline (Build & Test)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code from GitHub
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up Java (Maven needs this)
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: maven

      # 3. Build project
      - name: Build project
        run: mvn clean package -DskipTests

      # 4. Run tests
      - name: Run tests
        run: mvn test

       # ---------------- EMAIL ON FAILURE ----------------
      - name: Send email on failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "❌ CI Build Failed - ${{ github.repository }}"
          to: srengty@gmail.com, ${{ github.actor }}
          from: GitHub Actions CI
          body: |
            ❌ Build Failed!

            Repository: ${{ github.houysang }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}

            Author: ${{ github.actor }}

            Check details:
            ${{ github.server_url }}/${{ github.repository }}/actions