<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Profiles - ID Card Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8f9fa; }
        .sidebar { min-height: 100vh; background: linear-gradient(180deg, #2c3e50 0%, #3498db 100%); }
        .sidebar .nav-link { color: rgba(255,255,255,.8); padding: .75rem 1rem; border-radius: .25rem; margin: .2rem .5rem; }
        .sidebar .nav-link:hover { color: #fff; background: rgba(255,255,255,.1); }
        .sidebar .nav-link.active { color: #fff; background: rgba(255,255,255,.2); }
        .sidebar .nav-link i { margin-right: .5rem; }
        .sidebar h5 { color: white; }
        .card { border-radius: .5rem; box-shadow: 0 2px 10px rgba(0,0,0,.08); border: none; }
        .profile-photo { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <!-- Sidebar -->
        <div class="col-md-2 sidebar p-3">
            <div class="text-white text-center mb-3">
                <i class="bi bi-credit-card-2-front" style="font-size: 2rem;"></i>
                <h5 class="mt-2">ID Card Mgmt</h5>
                <hr class="bg-light">
            </div>
            <ul class="nav flex-column">
                <li class="nav-item"><a class="nav-link active" th:href="@{/api/profiles/view/all}"><i class="bi bi-people"></i> All Profiles</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/api/profiles/view/create}"><i class="bi bi-person-plus"></i> Create Profile</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/api/profiles/view/batch}"><i class="bi bi-files"></i> Batch Create</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/api/templates/view/all}"><i class="bi bi-layout-text-window"></i> Templates</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/api/templates/view/create}"><i class="bi bi-plus-square"></i> New Template</a></li>
            </ul>
        </div>
        <!-- Main Content -->
        <div class="col-md-10 p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2><i class="bi bi-people"></i> All Profiles</h2>
                <a th:href="@{/api/profiles/view/create}" class="btn btn-primary"><i class="bi bi-person-plus"></i> Create Profile</a>
            </div>

            <!-- Search -->
            <div class="card mb-4">
                <div class="card-body">
                    <form class="row g-3" action="#">
                        <div class="col-md-6">
                            <div class="input-group">
                                <input type="text" class="form-control" id="searchInput" placeholder="Search by name, ID, email, department...">
                                <button class="btn btn-outline-secondary" type="button" onclick="searchProfiles()"><i class="bi bi-search"></i> Search</button>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <select class="form-select" id="typeFilter" onchange="filterByType()">
                                <option value="">All Types</option>
                                <option th:each="type : ${profileTypes}" th:value="${type}" th:text="${type}"></option>
                            </select>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Profile List -->
            <div class="card">
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-hover">
                            <thead>
                                <tr>
                                    <th>Photo</th>
                                    <th>Unique ID</th>
                                    <th>Name</th>
                                    <th>Type</th>
                                    <th>Department</th>
                                    <th>Email</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="profile : ${profiles}">
                                    <td>
                                        <img th:if="${photos.containsKey(profile.id)}" th:src="${photos.get(profile.id)}" class="profile-photo" alt="Photo">
                                        <i th:unless="${photos.containsKey(profile.id)}" class="bi bi-person-circle" style="font-size: 2rem; color: #ccc;"></i>
                                    </td>
                                    <td><span class="badge bg-secondary badge-id" th:text="${profile.uniqueId}"></span></td>
                                    <td th:text="${profile.fullName}"></td>
                                    <td><span class="badge" th:classappend="${profile.profileType == 'STUDENT'} ? 'bg-info' : (${profile.profileType == 'EMPLOYEE'} ? 'bg-success' : 'bg-warning')" th:text="${profile.profileType}"></span></td>
                                    <td th:text="${profile.department} ?: 'N/A'"></td>
                                    <td th:text="${profile.email} ?: 'N/A'"></td>
                                    <td>
                                        <div class="btn-group btn-group-sm">
                                            <a th:href="@{/api/profiles/view/{id}(id=${profile.id})}" class="btn btn-outline-info" title="View"><i class="bi bi-eye"></i></a>
                                            <a th:href="@{/api/profiles/view/edit/{id}(id=${profile.id})}" class="btn btn-outline-primary" title="Edit"><i class="bi bi-pencil"></i></a>
                                            <a th:href="@{/api/profiles/view/live-preview/{id}(id=${profile.id})}" class="btn btn-outline-success" title="Live Preview"><i class="bi bi-card-image"></i></a>
                                            <a th:href="@{/api/pdf/generate-with-qr/{id}(id=${profile.id})}" class="btn btn-outline-danger" title="PDF"><i class="bi bi-filetype-pdf"></i></a>
                                            <form th:action="@{/api/profiles/view/delete/{id}(id=${profile.id})}" method="post" style="display:inline;" onsubmit="return confirm('Delete this profile?')">
                                                <button class="btn btn-outline-danger" type="submit" title="Delete"><i class="bi bi-trash"></i></button>
                                            </form>
                                        </div>
                                    </td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(profiles)}">
                                    <td colspan="7" class="text-center py-4 text-muted">
                                        <i class="bi bi-inbox" style="font-size: 2rem;"></i>
                                        <p class="mt-2">No profiles found. Create your first profile!</p>
                                        <a th:href="@{/api/profiles/view/create}" class="btn btn-primary">Create Profile</a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
function searchProfiles() {
    const query = document.getElementById('searchInput').value;
    if (query.trim()) {
        window.location.href = '/api/profiles/view/all?search=' + encodeURIComponent(query);
    }
}

function filterByType() {
    const type = document.getElementById('typeFilter').value;
    if (type) {
        window.location.href = '/api/profiles/type/' + type;
    } else {
        window.location.href = '/api/profiles/view/all';
    }
}
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
