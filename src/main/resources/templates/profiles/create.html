<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Profile - ID Card Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8f9fa; }
        .sidebar { min-height: 100vh; background: linear-gradient(180deg, #2c3e50 0%, #3498db 100%); }
        .sidebar .nav-link { color: rgba(255,255,255,.8); padding: .75rem 1rem; border-radius: .25rem; margin: .2rem .5rem; }
        .sidebar .nav-link:hover { color: #fff; background: rgba(255,255,255,.1); }
        .sidebar .nav-link i { margin-right: .5rem; }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <div class="col-md-2 sidebar p-3">
            <div class="text-white text-center mb-3">
                <i class="bi bi-credit-card-2-front" style="font-size: 2rem;"></i>
                <h5 class="mt-2">ID Card Mgmt</h5>
                <hr class="bg-light">
            </div>
            <ul class="nav flex-column">
                <li class="nav-item"><a class="nav-link" th:href="@{/api/profiles/view/all}"><i class="bi bi-people"></i> All Profiles</a></li>
                <li class="nav-item"><a class="nav-link active" th:href="@{/api/profiles/view/create}"><i class="bi bi-person-plus"></i> Create Profile</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/api/profiles/view/batch}"><i class="bi bi-files"></i> Batch Create</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/api/templates/view/all}"><i class="bi bi-layout-text-window"></i> Templates</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/api/templates/view/create}"><i class="bi bi-plus-square"></i> New Template</a></li>
            </ul>
        </div>
        <div class="col-md-10 p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2><i class="bi bi-person-plus"></i> Create Profile</h2>
                <a th:href="@{/api/profiles/view/all}" class="btn btn-outline-secondary"><i class="bi bi-arrow-left"></i> Back</a>
            </div>

            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

            <div class="card">
                <div class="card-body">
                    <form th:action="@{/api/profiles/view/create}" method="post" enctype="multipart/form-data" th:object="${profileDTO}">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">First Name *</label>
                                <input type="text" class="form-control" th:field="*{firstName}" required minlength="2">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Last Name *</label>
                                <input type="text" class="form-control" th:field="*{lastName}" required minlength="2">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Email</label>
                                <input type="email" class="form-control" th:field="*{email}">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Phone Number</label>
                                <input type="text" class="form-control" th:field="*{phoneNumber}">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Profile Type *</label>
                                <select class="form-select" th:field="*{profileType}" required>
                                    <option value="">Select Type...</option>
                                    <option th:each="type : ${profileTypes}" th:value="${type}" th:text="${type}"></option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Department</label>
                                <input type="text" class="form-control" th:field="*{department}" placeholder="e.g. Computer Science">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Position</label>
                                <input type="text" class="form-control" th:field="*{position}" placeholder="e.g. Student, Teacher">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Date of Birth</label>
                                <input type="date" class="form-control" th:field="*{dateOfBirth}">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Photo (JPEG/PNG, max 5MB)</label>
                                <input type="file" class="form-control" name="photo" accept="image/jpeg,image/png">
                            </div>
                            <div class="col-12">
                                <label class="form-label">Address</label>
                                <textarea class="form-control" th:field="*{address}" rows="2"></textarea>
                            </div>
                            <div class="col-12 text-end">
                                <button type="submit" class="btn btn-primary"><i class="bi bi-save"></i> Create Profile</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
