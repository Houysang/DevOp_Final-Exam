<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ID Card Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f9fa;
        }
        .sidebar {
            min-height: 100vh;
            background: linear-gradient(180deg, #2c3e50 0%, #3498db 100%);
        }
        .sidebar .nav-link {
            color: rgba(255,255,255,.8);
            padding: .75rem 1rem;
            border-radius: .25rem;
            margin: .2rem .5rem;
        }
        .sidebar .nav-link:hover {
            color: #fff;
            background: rgba(255,255,255,.1);
        }
        .sidebar .nav-link.active {
            color: #fff;
            background: rgba(255,255,255,.2);
        }
        .sidebar .nav-link i {
            margin-right: .5rem;
        }
        .card {
            border-radius: .5rem;
            box-shadow: 0 2px 10px rgba(0,0,0,.08);
            border: none;
        }
        .badge-id {
            font-family: 'Courier New', monospace;
            letter-spacing: 1px;
        }
        .id-card-preview {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 1rem;
            padding: 2rem;
            color: white;
            max-width: 400px;
        }
        .id-card-preview .photo {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid white;
        }
        .id-card-preview .qr-code {
            width: 80px;
            height: 80px;
            background: white;
            padding: 5px;
            border-radius: 5px;
        }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <!-- Sidebar -->
        <div class="col-md-2 sidebar p-0">
            <div class="p-3 text-white text-center">
                <i class="bi bi-credit-card-2-front" style="font-size: 2rem;"></i>
                <h5 class="mt-2">ID Card Mgmt</h5>
                <hr class="bg-light">
            </div>
            <ul class="nav flex-column">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/api/profiles/view/all}">
                        <i class="bi bi-people"></i> All Profiles
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/api/profiles/view/create}">
                        <i class="bi bi-person-plus"></i> Create Profile
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/api/profiles/view/batch}">
                        <i class="bi bi-files"></i> Batch Create
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/api/templates/view/all}">
                        <i class="bi bi-layout-text-window"></i> Templates
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/api/templates/view/create}">
                        <i class="bi bi-plus-square"></i> New Template
                    </a>
                </li>
                <li class="nav-item mt-4">
                    <hr class="bg-light">
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#" onclick="window.open('/api/profiles/view/create', '_self')">
                        <i class="bi bi-house"></i> Home
                    </a>
                </li>
            </ul>
        </div>
        <!-- Main Content -->
        <div class="col-md-10 p-4">
</body>
</html>
