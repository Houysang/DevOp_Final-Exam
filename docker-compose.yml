version: '3.8'

services:

  web:
    image: ubuntu:24.04
    container_name: web-server

    ports:
      - "2222:22"

    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DB: A-Guov_Houysang-db
      MYSQL_USER: root
      MYSQL_PASSWORD: Hello@123

    depends_on:
      mysql:
        condition: service_healthy

    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf

    tty: true

    command: >
      bash -c "
      apt update &&
      apt install -y git openssh-server wget curl gnupg &&

      # Install JDK 21
      apt install -y openjdk-21-jdk &&
      java -version &&

      # Install Maven
      apt install -y maven &&
      mvn -version &&

      # Install NGINX
      apt install -y nginx &&
      mkdir -p /etc/nginx/conf.d &&
      cp /etc/nginx/conf.d/default.conf /etc/nginx/sites-enabled/default 2>/dev/null || true &&

      # Configure SSH
      mkdir /var/run/sshd &&
      echo 'root:mle123960' | chpasswd &&
      sed -i 's/#PermitRootLogin prohibit-password/PermitRootLogin yes/' /etc/ssh/sshd_config &&
      sed -i 's/#Port 22/Port 22/' /etc/ssh/sshd_config &&

      # Clone the project
      cd /opt &&
      if [ -d \"DevOp_Final-Exam\" ]; then
        cd DevOp_Final-Exam && git pull
      else
        git clone https://github.com/Houysang/DevOp_Final-Exam.git &&
        cd DevOp_Final-Exam
      fi &&

      # Build and run the Spring Boot app
      cd /opt/DevOp_Final-Exam/demo &&
      mvn clean package -DskipTests -q &&

      # Start SSH
      /usr/sbin/sshd &&

      # Start NGINX
      nginx -g 'daemon off;' &
      echo 'NGINX started on port 8080, proxying to Spring Boot on 8082' &&

      # Run Spring Boot app
      echo 'Starting Spring Boot application...' &&
      java -jar target/demo-0.0.1-SNAPSHOT.jar --server.port=8082 &
      echo 'Spring Boot started on port 8082' &&

      # Keep container running
      tail -f /dev/null
      "

  nginx:
    image: nginx:latest
    container_name: nginx-proxy

    ports:
      - "8443:8080"

    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - web

  mysql:
    image: mysql:8.0
    container_name: mysql-db

    environment:
      MYSQL_ROOT_PASSWORD: Hello@123
      MYSQL_DATABASE: A-Guov_Houysang-db

    ports:
      - "3307:3306"

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pHello@123"]
      interval: 10s
      timeout: 5s
      retries: 5

    volumes:
      - mysql-data:/var/lib/mysql

volumes:
  mysql-data: