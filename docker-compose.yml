services:

  web:
    image: ubuntu:24.04
    container_name: web-server

    ports:
      - "2222:22"

    tty: true

    command: >
      bash -c "
      apt update &&
      apt install -y git openssh-server wget &&
      mkdir /var/run/sshd &&
      echo 'root:#San#5552' | chpasswd &&
      /usr/sbin/sshd &&
      tail -f /dev/null
      "

    depends_on:
      - mysql

  nginx:
    image: nginx:latest
    container_name: nginx

    ports:
      - "8443:8080"

    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - web
      - phpmyadmin

  mysql:
    image: mysql:8

    container_name: mysql-db

    environment:
      MYSQL_ROOT_PASSWORD: Hello@123
      MYSQL_DATABASE: A-GUOV_Houysang-db

    ports:
      - "3309:3306"

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: phpmyadmin

    environment:
      PMA_HOST: mysql-db
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: Hello@123
      UPLOAD_LIMIT: 64M

    ports:
      - "8083:80"

    depends_on:
      - mysql