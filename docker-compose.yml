version: '3.8'

services:

  web:
    image: ubuntu:24.04
    container_name: web-server

    ports:
      - "8443:8082"   # Website (NGINX proxy)
      - "2222:22"     # SSH

    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DB: A-Guov_Houysang-db
      MYSQL_USER: root
      MYSQL_PASSWORD: Hello@123

    depends_on:
      mysql:
        condition: service_healthy

    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf

    tty: true

    command: >
      bash -c "
      apt update &&
      apt install -y git openssh-server wget curl gnupg nginx openjdk-21-jdk maven &&

      # Configure NGINX
      rm -f /etc/nginx/sites-enabled/default &&
      mkdir -p /etc/nginx/conf.d &&
      echo 'server {
          listen 8080;
          location / {
              proxy_pass http://127.0.0.1:8082;
              proxy_set_header Host \$host;
              proxy_set_header X-Real-IP \$remote_addr;
          }
          client_max_body_size 10M;
      }' > /etc/nginx/conf.d/default.conf &&

      # Configure SSH
      mkdir /var/run/sshd &&
      echo 'root:mle123960' | chpasswd &&
      sed -i 's/#PermitRootLogin prohibit-password/PermitRootLogin yes/' /etc/ssh/sshd_config &&

      # Clone the project
      cd /opt &&
      if [ -d \"DevOp_Final-Exam\" ]; then
        cd DevOp_Final-Exam && git pull
      else
        git clone https://github.com/Houysang/DevOp_Final-Exam.git
        cd DevOp_Final-Exam
      fi &&

      # Build the Spring Boot app
      cd /opt/DevOp_Final-Exam/demo &&
      mvn clean package -DskipTests -q &&
      echo 'Build complete' &&

      # Start SSH daemon
      /usr/sbin/sshd &&
      echo 'SSH started on port 22 -> mapped to 2222' &&

      # Start NGINX
      nginx -g 'daemon off;' &
      echo 'NGINX started on port 8080 -> mapped to 8443' &&

      # Start Spring Boot
      java -jar target/demo-0.0.1-SNAPSHOT.jar --server.port=8082 &
      echo 'Spring Boot started on port 8082' &&

      # Keep container alive
      tail -f /dev/null
      "

  mysql:
    image: mysql:8.0
    container_name: mysql-db

    environment:
      MYSQL_ROOT_PASSWORD: Hello@123
      MYSQL_DATABASE: A-Guov_Houysang-db

    ports:
      - "3307:3306"

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pHello@123"]
      interval: 10s
      timeout: 5s
      retries: 10

    volumes:
      - mysql-data:/var/lib/mysql

volumes:
  mysql-data: